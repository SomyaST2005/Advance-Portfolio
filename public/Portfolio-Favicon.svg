<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0d7ff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>
  <!-- Accent dots -->
  <circle cx="54" cy="52" r="4" fill="#06b6d4" opacity="0.55"/>
  <circle cx="10" cy="12" r="3" fill="#a78bfa" opacity="0.45"/>
  <!-- Diagonal accent line -->
  <line x1="0" y1="32" x2="18" y2="0" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- SST cursive text -->
  <text
    x="32" y="42"
    text-anchor="middle"
    font-family="'Dancing Script','Brush Script MT',cursive"
    font-size="26"
    font-weight="700"
    fill="url(#textGrad)"
    letter-spacing="1"
  >SST</text>
</svg>
